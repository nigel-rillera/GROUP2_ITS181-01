server:
  port: 8080

spring:
  datasource:
    # ----------------------------------------------------------------
    # IMPORTANT: Update these credentials to match your local MySQL.
    # The database 'prodmsdb' will be auto-created on first run.
    # ----------------------------------------------------------------
    url: jdbc:mysql://localhost:3306/prodmsdb?allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: toor   # <-- CHANGE THIS to your MySQL root password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      ddl-auto: update
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB

logging:
  level:
    com:
      gabriel:
        pricems: TRACE
